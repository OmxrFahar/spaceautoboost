    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f5f5;
        color: #333;
        line-height: 1.5;
    }

    /* Header */
    .header {
        background: #111;
        padding: 15px 0;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 20px;
    }

    .logo img {
        height: 40px;
        width: auto;
    }

    .back-button {
        background: transparent;
        border: 1px solid #e01e1e;
        color: #e01e1e;
        padding: 8px 20px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .back-button:hover {
        background: #e01e1e;
        color: #fff;
    }

    /* Produto */
    .product-page {
        background: #fff;
        margin: 30px auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .product-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        padding: 30px;
    }

    /* Galeria */
    .gallery {
        position: sticky;
        top: 100px;
    }

    .main-image {
        background: #f8f8f8;
        border-radius: 16px;
        overflow: hidden;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .main-image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 20px;
    }

    .thumb-list {
        display: flex;
        gap: 12px;
        margin-top: 16px;
        flex-wrap: wrap;
    }

    .thumb {
        width: 80px;
        height: 80px;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        background: #f8f8f8;
    }

    .thumb.active {
        border-color: #e01e1e;
    }

    .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Info Produto */
    .brand {
        color: #e01e1e;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    .title {
        font-size: 26px;
        font-weight: 700;
        color: #111;
        margin-bottom: 12px;
    }

    /* BADGES APENAS INFORMATIVAS */
    .info-badges {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
    }

    .info-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 500;
        background: #f0f0f0;
        color: #555;
    }

    .info-badge.entrega-rapida {
        background: #e8f5e9;
        color: #2e7d32;
    }

    .info-badge.sob-encomenda {
        background: #fff8e1;
        color: #f57c00;
    }

    /* Rating */
    .rating-section {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
    }

    .stars {
        color: #ffc107;
        font-size: 18px;
    }

    /* Preço */
    .price-section {
        background: #f8f8f8;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
    }

    .current-price {
        font-size: 34px;
        font-weight: 800;
        color: #e01e1e;
    }

    .old-price {
        font-size: 18px;
        color: #999;
        text-decoration: line-through;
        margin-left: 12px;
    }

    .discount {
        background: #e01e1e;
        color: #fff;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        margin-left: 12px;
    }

    /* Entrega */
    .delivery-info {
        background: #f8f9fc;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
        border: 1px solid #eee;
    }

    .delivery-title {
        font-weight: 700;
        margin-bottom: 10px;
        font-size: 15px;
    }

    .delivery-detail {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        margin-bottom: 8px;
        color: #555;
    }

    .delivery-note {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px dashed #ddd;
        font-size: 12px;
        color: #888;
    }

    /* Botões */
    .action-buttons {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
    }

    .btn-buy {
        flex: 1;
        background: #e01e1e;
        border: none;
        color: #fff;
        padding: 15px;
        border-radius: 40px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-buy:hover {
        background: #c01818;
    }

    .btn-cart {
        flex: 1;
        background: transparent;
        border: 2px solid #e01e1e;
        color: #e01e1e;
        padding: 15px;
        border-radius: 40px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-cart:hover {
        background: #fff5f5;
    }

    /* Confiança */
    .trust-items {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        padding: 15px 0;
        border-top: 1px solid #eee;
    }

    .trust-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #666;
    }

    /* Tabs */
    .tabs-section {
        padding: 0 30px 30px 30px;
    }

    .tabs-header {
        display: flex;
        gap: 30px;
        border-bottom: 2px solid #eee;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .tab-btn {
        background: none;
        border: none;
        padding: 12px 0;
        font-size: 16px;
        font-weight: 600;
        color: #666;
        cursor: pointer;
        position: relative;
    }

    .tab-btn.active {
        color: #e01e1e;
    }

    .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        right: 0;
        height: 2px;
        background: #e01e1e;
    }

    .tab-content {
        display: none;
        animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .specs-table {
        width: 100%;
        border-collapse: collapse;
    }

    .specs-table td {
        padding: 12px;
        border-bottom: 1px solid #eee;
    }

    .specs-table td:first-child {
        font-weight: 600;
        width: 180px;
        background: #fafafa;
    }

    .review-card {
        background: #fafafa;
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 16px;
    }

    .faq-item {

        margin-bottom: 12px;
    }

        padding: 14px 0;

        display: flex;
        justify-content: space-between;
        align-items: center;

    }

    .faq-answer {

        color: #666;
        font-size: 14px;
        line-height: 1.6;
        display: none;
    }

    .faq-answer.show {
        display: block;
    }

    .faq-icon {

    }

        flex-wrap: wrap;
        justify-content: space-between;

        color: #fff;
        margin-bottom: 15px;
    }

    .footer-bottom {
        text-align: center;
        font-size: 13px;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #222;

        }

        .title {

        }
        .action-buttons {
            flex-direction: column;
        }
        .related-grid {
            grid-template-columns: 1fr;
        }
        .tabs-header {
            gap: 16px;
        }
        .tab-btn {
            font-size: 14px;
        }
        .thumb-list {
            justify-content: center;
        }
    }
</style>

    // Funções
    function formatarPreco(valor) {
        return valor.toLocaleString('pt') + ' MT';
    }

    function gerarEstrelas(nota) {
        let estrelas = '';
        for (let i = 0; i < Math.floor(nota); i++) estrelas += '★';
        if (nota % 1 >= 0.5) estrelas += '½';
        for (let i = 0; i < 5 - Math.ceil(nota); i++) estrelas += '☆';
        return estrelas;
    }

    // ========== FUNÇÕES DO CARRINHO ==========
    function adicionarAoCarrinho(produto) {
        let carrinho = JSON.parse(localStorage.getItem('space_carrinho')) || [];
        
        const existe = carrinho.find(item => item.id === produto.id);
        
        if (existe) {
            existe.quantidade = (existe.quantidade || 1) + 1;
        } else {
            carrinho.push({
                id: produto.id,
                nome: produto.nome,
                preco: produto.preco,
                imagem: produto.imagem,
                quantidade: 1
            });
        }
        
        localStorage.setItem('space_carrinho', JSON.stringify(carrinho));
        
        const totalItens = carrinho.reduce((total, item) => total + (item.quantidade || 1), 0);
        alert(`✅ Produto adicionado ao carrinho!\n📦 Total: ${totalItens} item(ns)`);
        
        // Atualiza o badge na página principal (se estiver aberta)
        localStorage.setItem('space_carrinho_total', totalItens);
    }

    // Pegar ID da URL
    function getProdutoId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }

    // Gerar FAQ HTML
    function gerarFAQ(faq) {
        if (!faq || faq.length === 0) {
            return '<p style="padding: 20px; text-align: center;">Nenhuma pergunta frequente cadastrada para este produto.</p>';
        }
        
        return faq.map((item, index) => `
            <div class="faq-item">
                <div class="faq-question" data-index="${index}">
                    ${item.pergunta}
                    <span class="faq-icon">▼</span>
                </div>
                <div class="faq-answer" id="faq-answer-${index}">
                    ${item.resposta}
                </div>
            </div>
        `).join('');
    }

    // Carregar produto
    function carregarProduto() {
        const id = getProdutoId();
        const produto = produtosDB[id];
        
        if (!produto) {
            document.getElementById('productPage').innerHTML = `
                <div style="text-align: center; padding: 50px;">
                    <h2>Produto não encontrado</h2>
                    <button class="back-button" onclick="history.back()" style="margin-top: 20px;">← Voltar</button>
                </div>
            `;
            return;
        }

        const isNacional = produto.tipo === 'nacional';
        
        const badgesHtml = isNacional ? `
            <div class="info-badge entrega-rapida">⚡ Entrega rápida - Moçambique</div>
            <div class="info-badge">✅ Em stock nacional</div>
        ` : `
            <div class="info-badge sob-encomenda">🌍 Sob encomenda - Importação</div>
            <div class="info-badge">📦 Produto disponível para importação</div>
        `;
        
        const deliveryHtml = isNacional ? `
            <div class="delivery-info">
                <div class="delivery-title">📦 Informações de entrega</div>
                <div class="delivery-detail">📍 Enviado de: Moçambique</div>
                <div class="delivery-detail">⏱️ Prazo estimado: 2 a 5 dias úteis</div>
                <div class="delivery-detail">🔍 Rastreio disponível</div>
                <div class="delivery-note">💡 Produto em stock nacional - Entrega rápida</div>
            </div>
        ` : `
            <div class="delivery-info">
                <div class="delivery-title">📦 Informações de entrega</div>
                <div class="delivery-detail">📍 Produto importado sob encomenda</div>
                <div class="delivery-detail">⏱️ Prazo estimado: 20 a 40 dias úteis</div>
                <div class="delivery-detail">🔍 Rastreio internacional + local</div>
                <div class="delivery-note">💡 Importamos para si - Suporte em português</div>
            </div>
        `;
        
        let specsHtml = '';
        for (const [key, value] of Object.entries(produto.especificacoes)) {
            specsHtml += `<tr><td>${key}</td><td>${value}</td></tr>`;
        }
        
        const faqHtml = gerarFAQ(produto.faq);
        
        const html = `
            <div class="product-grid">
                <div class="gallery">
                    <div class="main-image">
                        <img src="${produto.imagem}" alt="${produto.nome}" id="mainImg" onerror="this.src='https://placehold.co/500x500?text=Produto'">
                    </div>
                    <div class="thumb-list" id="thumbList">
                        ${produto.imagens.map((img, i) => `
                            <div class="thumb ${i === 0 ? 'active' : ''}" data-img="${img}">
                                <img src="${img}" onerror="this.src='https://placehold.co/80x80?text=Img'">
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div>
                    <div class="brand">SPACE AUTO BOOST</div>
                    <h1 class="title">${produto.nome}</h1>
                    
                    <div class="info-badges">
                        ${badgesHtml}
                    </div>
                    
                    <div class="rating-section">
                        <div class="stars">${gerarEstrelas(produto.avaliacao)}</div>
                        <span>(${produto.avaliacao} de 5)</span>
                        <span>• ${produto.vendidos} vendidos</span>
                    </div>
                    
                    <div class="price-section">
                        <span class="current-price">${formatarPreco(produto.preco)}</span>
                        <span class="old-price">${formatarPreco(produto.oldPrice)}</span>
                        <span class="discount">-${produto.desconto}% OFF</span>
                        <div style="margin-top: 8px;">ou 3x de ${formatarPreco(produto.preco / 3)} sem juros</div>
                    </div>
                    
                    ${deliveryHtml}
                    
                    <div class="action-buttons">
                        <button class="btn-buy" id="buyBtn">🛒 Comprar agora</button>
                        <button class="btn-cart" id="cartBtn">+ Adicionar ao carrinho</button>
                    </div>
                    
                    <div class="trust-items">
                        <div class="trust-item">🔒 Pagamento seguro</div>
                        <div class="trust-item">🛡️ Proteção ao comprador</div>
                        <div class="trust-item">💰 Garantia de reembolso</div>
                        <div class="trust-item">⭐ ${produto.garantia} de garantia</div>
                    </div>
                </div>
            </div>
            
            <div class="tabs-section">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="details">📋 Detalhes</button>
                    <button class="tab-btn" data-tab="specs">⚙️ Especificações</button>
                    <button class="tab-btn" data-tab="reviews">⭐ Avaliações</button>
                    <button class="tab-btn" data-tab="faq">❓ FAQ</button>
                </div>
                
                <div class="tab-content active" id="details">
                    <div style="padding: 20px; line-height: 1.8;">
                        <p>${produto.descricao}</p>
                        <br>
                        <p>✅ Material: ${produto.material}</p>
                        <p>✅ Garantia: ${produto.garantia}</p>
                        <p>✅ Produto de alta qualidade e performance</p>
                        <p>✅ Testado e aprovado por especialistas</p>
                    </div>
                </div>
                
                <div class="tab-content" id="specs">
                    <table class="specs-table">
                        ${specsHtml}
                    </table>
                </div>
                
                <div class="tab-content" id="reviews">
                    <div class="review-card">
                        <div style="font-weight: 700;">Carlos Silva</div>
                        <div class="stars">★★★★★</div>
                        <div>Produto excelente! Superou minhas expectativas. Entrega rápida.</div>
                        <div style="font-size: 12px; color: #999; margin-top: 8px;">Há 3 dias</div>
                    </div>
                    <div class="review-card">
                        <div style="font-weight: 700;">Amélia Santos</div>
                        <div class="stars">★★★★☆</div>
                        <div>Muito bom, qualidade excelente. Recomendo!</div>
                        <div style="font-size: 12px; color: #999; margin-top: 8px;">Há 1 semana</div>
                    </div>
                    <div class="review-card">
                        <div style="font-weight: 700;">João Manhiça</div>
                        <div class="stars">★★★★★</div>
                        <div>Melhor produto que já usei. Vale cada metical!</div>
                        <div style="font-size: 12px; color: #999; margin-top: 8px;">Há 2 semanas</div>
                    </div>
                </div>
                
                <div class="tab-content" id="faq">
                    <div style="padding: 20px;">
                        ${faqHtml}
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('productPage').innerHTML = html;
        
        // Inicializar galeria
        const thumbs = document.querySelectorAll('.thumb');
        const mainImg = document.getElementById('mainImg');
        thumbs.forEach(thumb => {
            thumb.addEventListener('click', function() {
                thumbs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const imgSrc = this.getAttribute('data-img');
                if (imgSrc && mainImg) mainImg.src = imgSrc;
            });
        });
        
        // Inicializar tabs
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const tabId = this.getAttribute('data-tab');
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });
        
        // Inicializar FAQ Accordion
        const faqQuestions = document.querySelectorAll('.faq-question');
        faqQuestions.forEach(q => {
            q.addEventListener('click', function() {
                const index = this.getAttribute('data-index');
                const answer = document.getElementById(`faq-answer-${index}`);
                const icon = this.querySelector('.faq-icon');
                answer.classList.toggle('show');
                icon.classList.toggle('rotated');
            });
        });
        
        // Botões - INTEGRADOS COM O CARRINHO
        document.getElementById('buyBtn')?.addEventListener('click', () => {
            adicionarAoCarrinho({
                id: produto.id,
                nome: produto.nome,
                preco: produto.preco,
                imagem: produto.imagem
            });
            // Redireciona para o carrinho
            window.location.href = 'carrinho.html';
        });
        
        document.getElementById('cartBtn')?.addEventListener('click', () => {
            adicionarAoCarrinho({
                id: produto.id,
                nome: produto.nome,
                preco: produto.preco,
                imagem: produto.imagem
            });
        });
    }
    
    // Carregar ao iniciar
    carregarProduto();
</script>
</body>
</html>
